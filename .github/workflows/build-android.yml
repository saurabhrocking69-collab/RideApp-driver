name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm install

      - name: Expo Prebuild (generates android/ folder)
        run: npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Pin Razorpay standard-core to avoid JitPack metadata timeout
        run: |
          cat .github/scripts/razorpay-patch.gradle >> android/build.gradle
          echo "systemProp.org.gradle.internal.http.connectionTimeout=120000" >> android/gradle.properties
          echo "systemProp.org.gradle.internal.http.socketTimeout=120000" >> android/gradle.properties

      - name: Build Release APK (always bundles JS + Hermes-compiles, no Metro needed)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
        env:
          JAVA_OPTS: "-Xmx4g"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sppero-buddy-release
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7
